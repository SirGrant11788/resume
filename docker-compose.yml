services:
  resume:
    image: sirgrant11788/resume:latest
    container_name: grant-verheul-resume
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"   # auto-pull new :latest if Watchtower is running

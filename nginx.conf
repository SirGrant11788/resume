server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── SPA fallback — all routes resolve to index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Immutable hashed assets (Vite content-hashed filenames) ────
    location /assets/ {
        expires        1y;
        add_header     Cache-Control "public, immutable";
        access_log     off;
    }

    # ── Deny hidden files ───────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
